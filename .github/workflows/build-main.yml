name: CI (main branch)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri / GTK / WebKit)
        run: bash scripts/install-linux-tauri-deps.sh

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm install --no-audit --no-fund

      - name: Frontend unit tests (with coverage)
        working-directory: apps/desktop
        run: npm run test:coverage

      - name: Frontend production build (Vite)
        working-directory: apps/desktop
        run: npm run build

      - name: Cargo check (Tauri backend)
        working-directory: apps/desktop/src-tauri
        run: cargo check
