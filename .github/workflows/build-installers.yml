name: Build Windows installer (tag releases)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set cache env
        shell: bash
        run: |
          echo "HF_HOME=${{ github.workspace }}/.cache/huggingface" >> $GITHUB_ENV
          echo "HUGGINGFACE_HUB_CACHE=${{ github.workspace }}/.cache/huggingface/hub" >> $GITHUB_ENV
          echo "CTRANSLATE2_CACHE=${{ github.workspace }}/.cache/ctranslate2" >> $GITHUB_ENV

      - name: Ensure cache dirs exist
        shell: bash
        run: |
          mkdir -p .cache/huggingface .cache/ctranslate2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps (bundling + transcriber)
        run: |
          python -m pip install -U pip
          python -m pip install -r scripts/requirements-bundling.txt
          python -m pip install -e services/transcriber

      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/huggingface
            .cache/ctranslate2
          key: ${{ runner.os }}-models-${{ hashFiles('scripts/fetch_models.py') }}-${{ hashFiles('scripts/requirements-bundling.txt') }}

      - name: Download models into bundle
        run: python scripts/fetch_models.py --require-all

      - name: Fetch FFmpeg (Windows)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\fetch_ffmpeg_windows.ps1

      - name: Build transcriber sidecar (Windows)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\build_transcriber_sidecar.ps1

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm install --no-audit --no-fund

      - name: Build Tauri bundle
        working-directory: apps/desktop
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-windows-latest
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes template)
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-windows-latest
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: .github/release-notes-template.md
          files: |
            dist/**/*
